<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 600;
        }

        p.description {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        #webcam-container {
            margin: 24px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e2e8f0;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            min-height: 50px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 15px;
        }

        .label-row:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 500;
        }

        .class-prob {
            font-family: monospace;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine</h2>
    <p class="description">โมเดลวิเคราะห์รูปภาพ (อัปเดตทุกๆ 3 วินาที)</p>
    
    <button type="button" class="btn-start" onclick="init()">เปิดกล้องและเริ่มทำงาน</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
        <span style="color: var(--text-muted); font-size: 14px;">ยังไม่ได้เปิดกล้อง</span>
    </div>
    
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงตรงนี้ -->
        <div style="color: var(--text-muted); text-align: center; font-size: 14px;">รอการวิเคราะห์...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลของคุณจาก Teachable Machine
    const URL = "https://teachablemachine.withgoogle.com/models/R29oofXTG1/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval; // ตัวแปรสำหรับเก็บ Interval ของการทำงานทุก 3 วินาที

    async function init() {
        // เปลี่ยนข้อความบนปุ่มเพื่อแจ้งสถานะกำลังโหลด
        const btn = document.querySelector('.btn-start');
        btn.disabled = true;
        btn.innerText = "กำลังโหลดโมเดล...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้อง (ขยายขนาดเป็น 250x250 ให้เข้ากับ UI ใหม่)
        const flip = true; 
        webcam = new tmImage.Webcam(250, 250, flip); 
        await webcam.setup(); 
        await webcam.play();

        // ล้างข้อความเริ่มต้นในตัวนำเสนอออก
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // ล้างข้อความเริ่มต้น
        
        for (let i = 0; i < maxPredictions; i++) {
            const row = document.createElement("div");
            row.className = "label-row";
            
            const nameSpan = document.createElement("span");
            nameSpan.className = "class-name";
            
            const probSpan = document.createElement("span");
            probSpan.className = "class-prob";
            
            row.appendChild(nameSpan);
            row.appendChild(probSpan);
            labelContainer.appendChild(row);
        }

        // ปรับเปลี่ยนข้อความปุ่มเมื่อพร้อมทำงาน
        btn.innerText = "กำลังทำงาน...";

        // เริ่มต้นการลูปอัปเดตภาพจากกล้อง และสั่ง Predict ทุกๆ 3 วินาที (3000 มิลลิวินาที)
        predictInterval = setInterval(async () => {
            webcam.update(); // อัปเดตเฟรมภาพปัจจุบันจากกล้อง
            await predict(); // ส่งภาพไปวิเคราะห์
        }, 3000);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const row = labelContainer.childNodes[i];
            
            // แยกการแสดงผลชื่อคลาสและเปอร์เซ็นต์ให้ดูสวยงาม
            row.querySelector('.class-name').innerText = prediction[i].className;
            row.querySelector('.class-prob').innerText = (prediction[i].probability * 100).toFixed(0) + "%";
        }
    }
</script>

</body>
</html>
