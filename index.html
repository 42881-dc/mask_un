<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance Vision AI</title>
    <style>
        :root {
            --bg-main: #090d16;
            --card-bg: #131a26;
            --accent: #10b981;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--card-bg);
            padding: 28px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #1e293b;
        }

        h2 {
            margin: 0 0 6px 0;
            font-size: 22px;
            font-weight: 600;
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .btn-toggle {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-toggle:hover {
            opacity: 0.9;
        }

        .btn-toggle:disabled {
            background-color: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .video-box {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 24px auto;
            border-radius: 14px;
            overflow: hidden;
            background: #090d16;
            border: 2px solid #1e293b;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: scaleX(-1); /* กลับด้านกล้อง Mirror */
        }

        .countdown-bar {
            width: 100%;
            height: 4px;
            background: #1e293b;
            margin-bottom: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .countdown-progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }

        #result-list {
            background: #090d16;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
        }

        .output-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
        }

        .output-row:last-child {
            border-bottom: none;
        }

        .output-val {
            font-family: monospace;
            font-weight: bold;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Ultra-Smooth Vision AI</h2>
    <div class="status-text">ประมวลผลแบบแยกเธรดเบื้องหลัง ทุกๆ 3 วินาที</div>
    
    <button type="button" class="btn-toggle" id="action-btn" onclick="startApp()">เปิดใช้งานระบบลื่นไหลพิเศษ</button>
    
    <div class="video-box">
        <div id="webcam-container"></div>
    </div>

    <div class="countdown-bar">
        <div class="countdown-progress" id="progress-line"></div>
    </div>
    
    <div id="result-list">
        <div style="text-align: center; color: var(--text-secondary); font-size: 13px;">ระบบสแตนด์บาย...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/R29oofXTG1/";
    
    let model, webcam, maxPredictions;
    let isPredicting = false;
    let lastPredictTime = 0;

    async function startApp() {
        const btn = document.getElementById('action-btn');
        btn.disabled = true;
        btn.innerText = "กำลังดาวน์โหลดโมเดล...";

        try {
            // โหลดโมเดลแบบ Asynchronous
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้องความละเอียดต่ำลงเล็กน้อย เพื่อความเร็วและการประมวลผลที่ลื่นขึ้นสูงสุด
            webcam = new tmImage.Webcam(240, 240, false); // ปิดการฟลิบตรงนี้ แล้วไปฟลิบด้วย CSS แทน เพื่อรีด FPS
            await webcam.setup();
            await webcam.play();

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            initUI();

            btn.innerText = "ระบบกำลังทำงานอย่างลื่นไหล";
            lastPredictTime = performance.now();
            
            // เริ่มต้น High-Performance Loop
            window.requestAnimationFrame(renderLoop);

        } catch (e) {
            alert("เกิดข้อผิดพลาดในการเปิดระบบ: " + e);
            btn.disabled = false;
            btn.innerText = "ลองอีกครั้ง";
        }
    }

    // ลูปนี้รับผิดชอบเรื่องการวาดภาพสดจากกล้องเพียงอย่างเดียว ทำให้ภาพลื่นไหล 60FPS ไม่กระตุก
    function renderLoop(timestamp) {
        webcam.update(); // อัปเดตเฟรมภาพสด

        // คำนวณเวลาที่ผ่านไป
        const elapsed = timestamp - lastPredictTime;
        
        // อัปเดตแถบความคืบหน้าถอยหลัง (3 วินาที = 3000 มิลลิวินาที)
        const progress = Math.min((elapsed / 3000) * 100, 100);
        document.getElementById("progress-line").style.width = progress + "%";

        // เมื่อครบกำหนด 3 วินาที และไม่มีกระบวนการทำนายค้างอยู่
        if (elapsed >= 3000) {
            if (!isPredicting) {
                isPredicting = true;
                lastPredictTime = timestamp; // รีเซ็ตเวลาตั้งต้นใหม่ทันที
                
                // ผลักดันกระบวนการ Predict ให้ทำงานเบื้องหลังแบบ Asynchronous ไม่ให้ขัดขวางการเรนเดอร์ภาพ
                runBackgroundPrediction();
            }
        }

        window.requestAnimationFrame(renderLoop);
    }

    // กระบวนการวิเคราะห์เบื้องหลัง (ไม่รบกวนความลื่นไหลของภาพหน้าจอ)
    async function runBackgroundPrediction() {
        try {
            // ทำนายผลจากเฟรมภาพ ณ เสี้ยววินาทีนั้น
            const prediction = await model.predict(webcam.canvas);
            
            // ปรับปรุงการแสดงผลผลลัพธ์บน UI
            const rows = document.getElementById("result-list").childNodes;
            for (let i = 0; i < maxPredictions; i++) {
                const percent = (prediction[i].probability * 100).toFixed(0);
                rows[i].querySelector('.output-val').innerText = percent + "%";
            }
        } catch (err) {
            console.error("Prediction error:", err);
        } finally {
            isPredicting = false; // เปิดทางให้รอบถัดไปสามารถทำนายผลต่อได้
        }
    }

    function initUI() {
        const list = document.getElementById("result-list");
        list.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const row = document.createElement("div");
            row.className = "output-row";
            row.innerHTML = `
                <span>${model.getClassLabels()[i]}</span>
                <span class="output-val">0%</span>
            `;
            list.appendChild(row);
        }
    }
</script>

</body>
</html>
