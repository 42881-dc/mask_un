<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Analyzer Pro</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-dark);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #334155;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-action {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
        }

        .btn-action:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-action:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .camera-wrapper {
            position: relative;
            margin: 28px auto;
            width: 260px;
            height: 260px;
            border-radius: 50%; /* เปลี่ยนเป็นทรงกลมสุดล้ำ */
            overflow: hidden;
            border: 4px solid #334155;
            background-color: #0f172a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }

        /* เอฟเฟกต์ไฟแฟลชตอนจับภาพ */
        .camera-wrapper.flash {
            border-color: #ffffff;
            animation: pulse 0.3s ease-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0px rgba(255,255,255,0); }
            50% { box-shadow: 0 0 30px rgba(255,255,255,0.8); }
            100% { box-shadow: 0 0 0px rgba(255,255,255,0); }
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            font-size: 14px;
            width: 80%;
        }

        /* ตัวนับเวลาถอยหลัง */
        .timer-badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-color);
            margin-bottom: 16px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .timer-badge.show {
            opacity: 1;
        }

        #results-panel {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #334155;
            text-align: left;
        }

        .result-item {
            margin-bottom: 14px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .result-name {
            font-weight: 500;
            color: #e2e8f0;
        }

        .result-val {
            font-family: monospace;
            color: var(--accent-color);
            font-weight: 600;
        }

        /* หลอดแสดงความมั่นใจ (Confidence Bar) */
        .progress-bar-bg {
            background: #1e293b;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(to right, #38bdf8, #6366f1);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Vision AI Predictor</h2>
    <div class="subtitle">ระบบวิเคราะห์วัตถุอัตโนมัติ ทุกๆ 3 วินาที</div>
    
    <button type="button" class="btn-action" id="start-btn" onclick="init()">เริ่มระบบทำงาน</button>
    
    <div class="camera-wrapper" id="camera-box">
        <div id="webcam-container">
            <div class="placeholder-text">กดปุ่มด้านบนเพื่อเปิดใช้งานกล้อง</div>
        </div>
    </div>

    <div class="timer-badge" id="timer-display">วิเคราะห์ในอีก: 3.0s</div>
    
    <div id="results-panel">
        <div style="text-align: center; color: var(--text-muted); font-size: 14px;">ระบบพร้อมทำงาน...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // เปลี่ยนลิงก์ Model ของคุณตรงนี้
    const URL = "https://teachablemachine.withgoogle.com/models/R29oofXTG1/";

    let model, webcam, resultsPanel, maxPredictions;
    let timeRemaining = 3.0;
    let countdownInterval, predictInterval;

    async function init() {
        const btn = document.getElementById('start-btn');
        btn.disabled = true;
        btn.innerText = "กำลังเชื่อมต่อโมเดล...";

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้องขนาด 260x260 ให้พอดีกับกรอบวงกลม
            webcam = new tmImage.Webcam(260, 260, true); 
            await webcam.setup(); 
            await webcam.play();

            // เคลียร์ค่าและใส่หน้ากล้องลงไปแทน
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // เตรียมหน้าต่างแสดงผลลัพธ์
            resultsPanel = document.getElementById("results-panel");
            createResultElements();

            btn.innerText = "ระบบกำลังทำงาน";
            document.getElementById("timer-display").classList.add("show");

            // ลูปหลัก: ให้กล้อง Feed ภาพสดตลอดเวลาเพื่อให้ภาพไม่กระตุกนิ่ง
            window.requestAnimationFrame(cameraLoop);

            // เริ่มการตั้งเวลา Predict และแสดง Countdown ทุกๆ 3 วินาที
            startAutomation();

        } catch (error) {
            alert("ไม่สามารถเปิดกล้องหรือโหลดโมเดลได้: " + error);
            btn.disabled = false;
            btn.innerText = "ลองใหม่อีกครั้ง";
        }
    }

    async function cameraLoop() {
        webcam.update();
        window.requestAnimationFrame(cameraLoop);
    }

    function startAutomation() {
        // 1. ตั้งตัวนับถอยหลังแสดงผลบนหน้าจอให้ผู้ใช้รับรู้ (อัปเดตทุก 100ms)
        countdownInterval = setInterval(() => {
            timeRemaining -= 0.1;
            if (timeRemaining <= 0) {
                timeRemaining = 3.0; // รีเซ็ตตัวเลข
            }
            document.getElementById("timer-display").innerText = `วิเคราะห์ในอีก: ${timeRemaining.toFixed(1)}s`;
        }, 100);

        // 2. สั่งทำนายผล (Predict) จริงๆ ทุกๆ 3 วินาที
        predictInterval = setInterval(async () => {
            triggerFlashEffect();
            await predict();
        }, 3000);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const item = resultsPanel.childNodes[i];
            const percentage = (prediction[i].probability * 100).toFixed(0);
            
            item.querySelector('.result-val').innerText = percentage + "%";
            item.querySelector('.progress-bar-fill').style.width = percentage + "%";
        }
    }

    function createResultElements() {
        resultsPanel.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const item = document.createElement("div");
            item.className = "result-item";
            item.innerHTML = `
                <div class="result-info">
                    <span class="result-name">${model.getClassLabels()[i]}</span>
                    <span class="result-val">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill"></div>
                </div>
            `;
            resultsPanel.appendChild(item);
        }
    }

    function triggerFlashEffect() {
        const cameraBox = document.getElementById("camera-box");
        cameraBox.classList.add("flash");
        setTimeout(() => {
            cameraBox.classList.remove("flash");
        }, 300);
    }
</script>

</body>
</html>
